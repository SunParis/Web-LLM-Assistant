<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extension Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1 id="settings-title"></h1>

      <label>
        <span id="label-language"></span>
        <select id="display-language">
          <option value="en">English</option>
          <option value="zh-Hant">繁體中文</option>
          <option value="zh-Hans">简体中文</option>
        </select>
      </label>

      <label>
        <span id="label-theme-mode"></span>
        <select id="theme-mode">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>

      <label>
        <span id="label-api-url"></span>
        <input id="api-url" type="text" />
      </label>

      <label>
        <span id="label-api-key"></span>
        <input id="api-key" type="password" />
      </label>

      <label>
        <span id="label-model"></span>
        <input id="model" type="text" />
      </label>

      <label>
        <span id="label-prompt"></span>
        <textarea id="system-prompt" rows="4"></textarea>
        <small id="prompt-help" class="help"></small>
      </label>

      <label>
        <span id="label-temperature"></span>
        <input id="temperature" type="number" step="0.1" min="0" max="2" />
      </label>

      <label>
        <span id="label-top-p"></span>
        <input id="top-p" type="number" step="0.1" min="0" max="1" />
      </label>

      <label>
        <span id="label-max-tokens"></span>
        <input id="max-tokens" type="number" min="1" step="1" />
      </label>

      <div class="btn-row">
        <button id="save-btn" type="button"></button>
        <button id="test-btn" type="button"></button>
      </div>

      <p id="status"></p>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
